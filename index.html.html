<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نظام التقارير اليومية - الفترة المسائية</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f4f6f9;
    --surface: #ffffff;
    --surface2: #f8f9fb;
    --surface3: #eef0f4;
    --border: #dde1e8;
    --border-strong: #c5cad4;
    --text: #1a2233;
    --text-muted: #5a6478;
    --text-dim: #8b95a8;
    --accent: #1d5fa8;
    --accent-light: #e8f0fb;
    --accent-mid: #3a7dd4;
    --green: #1a7f45;
    --green-light: #e6f4ec;
    --red: #c0392b;
    --red-light: #fdecea;
    --orange: #c97a10;
    --orange-light: #fef3e2;
    --blue-light: #e8f2ff;
    --purple: #6d3fa8;
    --purple-light: #f0ebff;
    --gold: #b8860b;
    --gold-light: #fdf6e3;
    --shadow-sm: 0 1px 4px rgba(0,0,0,0.07);
    --shadow: 0 4px 16px rgba(0,0,0,0.09);
    --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
    --radius: 12px;
    --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Cairo', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    direction: rtl;
  }

  /* NAV */
  nav {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: var(--shadow-sm);
  }
  .nav-brand {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 17px;
    font-weight: 800;
    color: var(--accent);
  }
  .nav-brand .logo {
    width: 36px; height: 36px;
    background: var(--accent);
    border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; color: #fff;
    box-shadow: 0 2px 8px rgba(29,95,168,0.3);
  }
  .nav-tabs { display: flex; gap: 4px; }
  .nav-tab {
    padding: 8px 18px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    transition: all 0.2s;
    color: var(--text-muted);
    border: none;
    background: none;
    font-family: 'Cairo', sans-serif;
  }
  .nav-tab:hover { background: var(--surface3); color: var(--text); }
  .nav-tab.active { background: var(--accent-light); color: var(--accent); font-weight: 700; }

  /* PAGES */
  .page { display: none; padding: 28px 24px; max-width: 1360px; margin: 0 auto; }
  .page.active { display: block; }

  /* SECTION HEADER */
  .section-header {
    display: flex; align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
  }
  .section-title {
    font-size: 21px; font-weight: 800;
    color: var(--text);
    display: flex; align-items: center; gap: 10px;
  }
  .badge {
    font-size: 11px; font-weight: 700;
    padding: 3px 10px; border-radius: 20px;
    background: var(--accent-light);
    color: var(--accent);
    border: 1px solid rgba(29,95,168,0.2);
  }

  /* CARDS */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 22px;
    margin-bottom: 18px;
    box-shadow: var(--shadow-sm);
  }
  .card-title {
    font-size: 14px; font-weight: 700;
    color: var(--accent);
    margin-bottom: 18px;
    padding-bottom: 12px;
    border-bottom: 2px solid var(--accent-light);
    display: flex; align-items: center; gap: 8px;
  }

  /* FORM */
  .form-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 14px; margin-bottom: 14px;
  }
  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .form-group label {
    font-size: 11px; font-weight: 700;
    color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .form-group input, .form-group select, .form-group textarea {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 9px 12px;
    color: var(--text);
    font-family: 'Cairo', sans-serif;
    font-size: 14px;
    transition: all 0.2s;
    direction: rtl;
  }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
    outline: none;
    border-color: var(--accent-mid);
    background: #fff;
    box-shadow: 0 0 0 3px rgba(29,95,168,0.1);
  }
  .form-group input[readonly] {
    background: var(--accent-light);
    color: var(--accent);
    font-weight: 700;
    border-color: transparent;
  }
  .form-group textarea { min-height: 76px; resize: vertical; }

  /* SCORE BUTTONS */
  .score-row {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid var(--surface3);
  }
  .score-row:last-child { border-bottom: none; }
  .score-label { flex: 1; font-size: 13px; color: var(--text-muted); font-weight: 500; }
  .score-btns { display: flex; gap: 5px; }
  .score-btn {
    width: 38px; height: 38px;
    border-radius: 9px;
    border: 1.5px solid var(--border);
    background: var(--surface2);
    color: var(--text-muted);
    font-size: 13px; font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'Cairo', sans-serif;
  }
  .score-btn:hover { border-color: var(--accent-mid); color: var(--accent); background: var(--accent-light); }
  .score-btn.selected { background: var(--accent); border-color: var(--accent); color: #fff; box-shadow: 0 2px 8px rgba(29,95,168,0.3); }
  .score-total {
    font-size: 15px; font-weight: 800;
    color: var(--accent); min-width: 24px;
    text-align: center;
  }

  /* AXIS BLOCK */
  .axis-block {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 16px; margin-bottom: 12px;
  }
  .axis-title {
    font-size: 13px; font-weight: 700;
    margin-bottom: 10px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .axis-score-display {
    font-size: 13px; font-weight: 800;
    background: var(--accent-light);
    color: var(--accent);
    padding: 3px 10px; border-radius: 20px;
  }

  /* MASANDA TABS */
  .masanda-tabs {
    display: flex; gap: 6px;
    flex-wrap: wrap; margin-bottom: 18px;
  }
  .masanda-tab {
    padding: 9px 18px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    font-size: 13px; font-weight: 600;
    transition: all 0.2s;
    color: var(--text-muted);
    border: 1.5px solid var(--border);
    background: var(--surface);
    font-family: 'Cairo', sans-serif;
    box-shadow: var(--shadow-sm);
  }
  .masanda-tab:hover { border-color: var(--accent-mid); color: var(--accent); }
  .masanda-tab.active { background: var(--accent); border-color: var(--accent); color: #fff; box-shadow: 0 3px 10px rgba(29,95,168,0.25); }

  /* BUTTONS */
  .btn {
    padding: 10px 22px; border-radius: var(--radius-sm);
    border: none; font-family: 'Cairo', sans-serif;
    font-size: 14px; font-weight: 700;
    cursor: pointer; transition: all 0.2s;
  }
  .btn-primary { background: var(--accent); color: #fff; box-shadow: 0 2px 8px rgba(29,95,168,0.25); }
  .btn-primary:hover { background: #1751a0; transform: translateY(-1px); box-shadow: 0 4px 14px rgba(29,95,168,0.35); }
  .btn-outline { background: var(--surface); border: 1.5px solid var(--border); color: var(--text-muted); }
  .btn-outline:hover { border-color: var(--accent-mid); color: var(--accent); background: var(--accent-light); }
  .btn-green { background: var(--green); color: #fff; }
  .btn-green:hover { opacity: 0.87; }
  .btn-red { background: var(--red); color: #fff; }
  .btn-red:hover { opacity: 0.87; }

  /* STATS GRID */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
    gap: 14px; margin-bottom: 22px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
    box-shadow: var(--shadow-sm);
    position: relative; overflow: hidden;
  }
  .stat-card::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 3px;
    background: var(--stat-color, var(--accent));
    border-radius: 0 0 var(--radius) var(--radius);
  }
  .stat-value { font-size: 30px; font-weight: 900; color: var(--stat-color, var(--accent)); margin-bottom: 4px; }
  .stat-label { font-size: 12px; color: var(--text-muted); font-weight: 600; }

  /* TABLE */
  .report-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .report-table th {
    background: var(--surface3);
    color: var(--text-muted);
    font-size: 11px; font-weight: 700;
    padding: 10px 14px; text-align: right;
    border-bottom: 2px solid var(--border);
    letter-spacing: 0.3px;
  }
  .report-table td {
    padding: 11px 14px;
    border-bottom: 1px solid var(--surface3);
    color: var(--text); font-weight: 500;
  }
  .report-table tr:hover td { background: var(--surface2); }

  /* SCORE PILL */
  .score-pill {
    display: inline-flex; align-items: center;
    padding: 4px 11px; border-radius: 20px;
    font-size: 12px; font-weight: 700;
  }
  .score-high { background: var(--green-light); color: var(--green); border: 1px solid rgba(26,127,69,0.2); }
  .score-med { background: var(--orange-light); color: var(--orange); border: 1px solid rgba(201,122,16,0.2); }
  .score-low { background: var(--red-light); color: var(--red); border: 1px solid rgba(192,57,43,0.2); }

  /* RANKING */
  .ranking-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 16px; }
  .rank-card { border: 1px solid var(--border); border-radius: var(--radius-sm); overflow: hidden; background: var(--surface); }
  .rank-header {
    padding: 10px 16px; font-size: 13px; font-weight: 700;
    display: flex; align-items: center; gap: 8px;
  }
  .rank-best { background: var(--green-light); color: var(--green); border-bottom: 1px solid rgba(26,127,69,0.15); }
  .rank-worst { background: var(--red-light); color: var(--red); border-bottom: 1px solid rgba(192,57,43,0.15); }
  .rank-item {
    padding: 10px 16px;
    display: flex; align-items: center; justify-content: space-between;
    border-top: 1px solid var(--surface3); font-size: 13px;
  }
  .rank-medal { font-size: 17px; margin-left: 8px; }

  /* BAR CHART */
  .bar-chart { margin-top: 8px; }
  .bar-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
  .bar-label { font-size: 12px; color: var(--text-muted); min-width: 80px; font-weight: 600; }
  .bar-track { flex: 1; height: 9px; background: var(--surface3); border-radius: 5px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 5px; transition: width 0.9s cubic-bezier(.4,0,.2,1); }
  .bar-val { font-size: 12px; font-weight: 700; color: var(--text); min-width: 32px; }

  /* CHART CONTAINER */
  .chart-container {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 18px; margin-top: 14px;
  }
  .chart-title { font-size: 12px; font-weight: 700; color: var(--text-muted); margin-bottom: 14px; text-transform: uppercase; letter-spacing: 0.4px; }

  /* OBSERVATIONS */
  .obs-row {
    display: grid; grid-template-columns: 140px 1fr;
    gap: 12px; align-items: start; margin-bottom: 10px;
  }
  .obs-row label { font-size: 13px; font-weight: 700; color: var(--text); padding-top: 10px; }

  /* MASANDA PANEL */
  .masanda-panel { display: none; }
  .masanda-panel.active { display: block; }

  /* WING CHIPS */
  .wing-config { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
  .wing-chip {
    background: var(--accent-light);
    border: 1px solid rgba(29,95,168,0.2);
    border-radius: 6px; padding: 5px 12px;
    font-size: 12px; font-weight: 600;
    color: var(--accent);
  }

  /* TOAST */
  .toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--green); color: #fff;
    padding: 12px 24px; border-radius: var(--radius);
    font-weight: 700; font-size: 14px;
    transition: transform 0.3s; z-index: 9999;
    box-shadow: var(--shadow-lg);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* REPORT HEADER */
  .report-view { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); }
  .report-view-header {
    background: linear-gradient(135deg, var(--accent) 0%, #2563a8 100%);
    padding: 28px; text-align: center; color: #fff;
  }
  .report-view-header h1 { font-size: 20px; font-weight: 900; margin-bottom: 4px; }
  .report-view-header p { font-size: 13px; opacity: 0.85; }

  /* PERIOD SELECTOR */
  .period-selector { display: flex; gap: 8px; margin-bottom: 20px; }
  .period-btn {
    padding: 8px 20px; border-radius: var(--radius-sm);
    cursor: pointer; font-size: 13px; font-weight: 600;
    border: 1.5px solid var(--border); background: var(--surface);
    color: var(--text-muted); font-family: 'Cairo', sans-serif;
    transition: all 0.2s;
  }
  .period-btn:hover { border-color: var(--accent-mid); color: var(--accent); }
  .period-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* TOTAL ROW */
  .total-row td { font-weight: 800 !important; background: var(--accent-light) !important; color: var(--accent) !important; }

  /* INFO ROW */
  .info-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px; margin-bottom: 0;
  }

  /* EMPTY STATE */
  .empty-state { text-align: center; padding: 60px 20px; color: var(--text-dim); }
  .empty-state .icon { font-size: 48px; margin-bottom: 14px; }
  .empty-state p { font-size: 15px; font-weight: 500; }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--surface3); }
  ::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 3px; }

  @media (max-width: 768px) {
    .info-row { grid-template-columns: 1fr 1fr; }
    .ranking-grid { grid-template-columns: 1fr; }
    nav { padding: 0 14px; }
    .page { padding: 16px 12px; }
  }
</style>
</head>
<body>

<nav>
  <div class="nav-brand">
    <div class="logo">🏛</div>
    <span>نظام التقارير اليومية</span>
  </div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showPage('entry')">📝 إدخال البيانات</button>
    <button class="nav-tab" onclick="showPage('daily')">📊 التقرير اليومي</button>
    <button class="nav-tab" onclick="showPage('weekly')">📅 أسبوعي / شهري</button>
    <button class="nav-tab" onclick="showPage('history')">📚 السجل</button>
  </div>
</nav>

<!-- PAGE: ENTRY -->
<div id="page-entry" class="page active">
  <div class="section-header">
    <div class="section-title">📝 إدخال بيانات الفترة المسائية <span class="badge">تقرير جديد</span></div>
    <div style="display:flex;gap:10px">
      <button class="btn btn-outline" onclick="clearForm()">🗑️ مسح</button>
      <button class="btn btn-primary" onclick="saveReport()">💾 حفظ التقرير</button>
    </div>
  </div>

  <div class="card">
    <div class="card-title">📅 معلومات اليوم</div>
    <div class="info-row">
      <div class="form-group"><label>التاريخ</label><input type="date" id="inp-date"></div>
      <div class="form-group"><label>اليوم</label><input type="text" id="inp-day" readonly placeholder="—"></div>
      <div class="form-group"><label>الأسبوع</label><input type="text" id="inp-week" readonly placeholder="—"></div>
      <div class="form-group"><label>الشهر</label><input type="text" id="inp-month" readonly placeholder="—"></div>
    </div>
  </div>

  <div class="masanda-tabs" id="masanda-tabs">
    <button class="masanda-tab active" onclick="switchMasanda(0)">المساندة الأولى</button>
    <button class="masanda-tab" onclick="switchMasanda(1)">المساندة الثانية</button>
    <button class="masanda-tab" onclick="switchMasanda(2)">المساندة الثالثة</button>
    <button class="masanda-tab" onclick="switchMasanda(3)">المساندة الرابعة</button>
    <button class="masanda-tab" onclick="switchMasanda(4)">المساندة الخامسة</button>
    <button class="masanda-tab" onclick="switchMasanda(5)">المساندة السادسة</button>
    <button class="masanda-tab" onclick="switchMasanda(6)">تعايش + هويتي</button>
  </div>

  <div id="masanda-forms"></div>
</div>

<!-- PAGE: DAILY -->
<div id="page-daily" class="page">
  <div class="section-header">
    <div class="section-title">📊 التقرير اليومي</div>
    <div style="display:flex;gap:10px;align-items:center">
      <input type="date" id="view-date" style="background:var(--surface);border:1.5px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-family:'Cairo',sans-serif;font-size:13px;" onchange="renderDailyReport()">
      <button class="btn btn-primary" onclick="exportReport()">🖨️ طباعة / تصدير</button>
    </div>
  </div>
  <div id="daily-content">
    <div class="empty-state"><div class="icon">📊</div><p>اختر تاريخاً لعرض التقرير</p></div>
  </div>
</div>

<!-- PAGE: WEEKLY/MONTHLY -->
<div id="page-weekly" class="page">
  <div class="section-header">
    <div class="section-title">📅 التقارير الدورية</div>
  </div>
  <div class="period-selector">
    <button class="period-btn active" onclick="showPeriod('weekly',this)">📅 أسبوعي</button>
    <button class="period-btn" onclick="showPeriod('monthly',this)">📆 شهري</button>
  </div>
  <div id="period-content">
    <div class="empty-state"><div class="icon">📅</div><p>لا توجد بيانات كافية بعد</p></div>
  </div>
</div>

<!-- PAGE: HISTORY -->
<div id="page-history" class="page">
  <div class="section-header">
    <div class="section-title">📚 سجل التقارير</div>
    <button class="btn btn-red" onclick="if(confirm('هل أنت متأكد من حذف جميع البيانات؟')){localStorage.clear();loadHistory();}">🗑️ مسح الكل</button>
  </div>
  <div id="history-content"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const MASANDAT = [
  { name: 'المساندة الأولى', wings: [1,2,3,4,5,6,7,8] },
  { name: 'المساندة الثانية', wings: [9,10,15,16] },
  { name: 'المساندة الثالثة', wings: [21,22,23,24] },
  { name: 'المساندة الرابعة', wings: [25,26,27,28,29,30,31,32] },
  { name: 'المساندة الخامسة', wings: [33,34,35,36,37,38,39,40] },
  { name: 'المساندة السادسة', wings: [47,48,49,50,51,52,53,54] },
  { name: 'تعايش + هويتي', wings: ['هويتي','تعايش'] }
];
const AXES = [
  { key:'iltizam', label:'محور الالتزام اليومي 🎯', color:'#1d5fa8', items:['التزام المستفيدين بالتعليمات الظاهرة','فعالية وتجاوب القيم','تطبيق المهام وعدم وجود مقاومة'] },
  { key:'suluk', label:'محور السلوك والانضباط 🛡️', color:'#6d3fa8', items:['تجاوب المستفيدين بتعديل الملاحظات','مستوى الهدوء العام داخل الجناح','وجود توترات أو تجمعات مقلقة'] },
  { key:'tafaul', label:'محور التفاعل العلاجي 💊', color:'#1a7f45', items:['وجود مؤشرات مقاومة أو سلوكيات سلبية','وجود برامج وأنشطة مسائية من اللجان','مستوى التفاعل الإيجابي للنزلاء ظاهرياً'] },
  { key:'sukan', label:'محور السكن والنظام 🏠', color:'#c97a10', items:['النظافة العامة والترتيب الظاهر','سلامة المرافق وعدم وجود عبث ظاهر','وجود ستائر داخل الغرف'] }
];
const DAYS_AR = ['الأحد','الاثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];
const MONTHS_AR = ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
let currentMasanda = 0;

window.onload = () => {
  setTodayDate();
  buildForms();
  document.getElementById('view-date').valueAsDate = new Date();
  renderDailyReport();
  showPeriod('weekly', document.querySelector('.period-btn'));
  loadHistory();
};

function setTodayDate() {
  const today = new Date();
  const d = today.toISOString().split('T')[0];
  document.getElementById('inp-date').value = d;
  updateDateInfo(d);
  document.getElementById('inp-date').addEventListener('change', e => updateDateInfo(e.target.value));
}
function updateDateInfo(val) {
  if (!val) return;
  const d = new Date(val + 'T12:00:00');
  document.getElementById('inp-day').value = DAYS_AR[d.getDay()];
  document.getElementById('inp-week').value = 'الأسبوع ' + getWeekNum(d);
  document.getElementById('inp-month').value = MONTHS_AR[d.getMonth()] + ' ' + d.getFullYear();
}
function getWeekNum(d) {
  const onejan = new Date(d.getFullYear(),0,1);
  return Math.ceil((((d-onejan)/86400000)+onejan.getDay()+1)/7);
}

function buildForms() {
  const c = document.getElementById('masanda-forms');
  c.innerHTML = MASANDAT.map((m,mi) => `
    <div class="masanda-panel ${mi===0?'active':''}" id="panel-${mi}">
      <div class="card">
        <div class="card-title">🏢 ${m.name}</div>
        <div class="wing-config">${m.wings.map(w=>`<div class="wing-chip">جناح ${w}</div>`).join('')}</div>
        <div class="form-row">
          <div class="form-group"><label>عدد المستفيدين</label><input type="number" id="m${mi}-beneficiaries" min="0" placeholder="0"></div>
          <div class="form-group"><label>عدد المخالفات</label><input type="number" id="m${mi}-violations" min="0" placeholder="0"></div>
          <div class="form-group"><label>الدرجة الإجمالية</label><input type="text" id="m${mi}-avg" readonly placeholder="0 / 60"></div>
        </div>
      </div>
      ${AXES.map((ax,ai)=>`
        <div class="axis-block">
          <div class="axis-title">
            <span style="color:${ax.color};font-weight:700">${ax.label}</span>
            <span class="axis-score-display" id="m${mi}-ax${ai}-total">0 / 15</span>
          </div>
          ${ax.items.map((item,ii)=>`
            <div class="score-row">
              <div class="score-label">${item}</div>
              <div class="score-btns">
                ${[1,2,3,4,5].map(v=>`<button class="score-btn" data-mi="${mi}" data-ai="${ai}" data-ii="${ii}" data-val="${v}" onclick="selectScore(this)">${v}</button>`).join('')}
              </div>
              <div class="score-total" id="m${mi}-ax${ai}-i${ii}-val">—</div>
            </div>
          `).join('')}
        </div>
      `).join('')}
      <div class="card">
        <div class="card-title">📝 ملاحظات المسارات</div>
        <div class="obs-row"><label>🛡️ المسار الأمني</label><textarea id="m${mi}-obs-amni" placeholder="ملاحظات أمنية..."></textarea></div>
        <div class="obs-row"><label>🔧 المسار الفني</label><textarea id="m${mi}-obs-fanni" placeholder="ملاحظات فنية..."></textarea></div>
        <div class="obs-row"><label>📚 مسار البرامج</label><textarea id="m${mi}-obs-baramij" placeholder="ملاحظات البرامج..."></textarea></div>
      </div>
      <div style="text-align:left;margin-top:-6px;margin-bottom:22px">
        <button class="btn btn-primary" onclick="switchMasanda(${Math.min(mi+1,6)})">
          ${mi<6?'التالي: '+MASANDAT[mi+1].name:'عرض التقرير'} ←
        </button>
      </div>
    </div>
  `).join('');
}

function selectScore(btn) {
  const mi=+btn.dataset.mi,ai=+btn.dataset.ai,ii=+btn.dataset.ii,val=+btn.dataset.val;
  document.querySelectorAll(`.score-btn[data-mi="${mi}"][data-ai="${ai}"][data-ii="${ii}"]`).forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected');
  document.getElementById(`m${mi}-ax${ai}-i${ii}-val`).textContent=val;
  updateAxisTotal(mi,ai);
  updateStats(mi);
}
function updateAxisTotal(mi,ai) {
  let t=0;
  AXES[ai].items.forEach((_,ii)=>{
    const s=document.querySelector(`.score-btn.selected[data-mi="${mi}"][data-ai="${ai}"][data-ii="${ii}"]`);
    if(s) t+=+s.dataset.val;
  });
  document.getElementById(`m${mi}-ax${ai}-total`).textContent=t+' / 15';
}
function updateStats(mi) {
  let g=0;
  AXES.forEach((_,ai)=>{
    AXES[ai].items.forEach((_,ii)=>{
      const s=document.querySelector(`.score-btn.selected[data-mi="${mi}"][data-ai="${ai}"][data-ii="${ii}"]`);
      if(s) g+=+s.dataset.val;
    });
  });
  document.getElementById(`m${mi}-avg`).value=g+' / 60';
}
function switchMasanda(idx) {
  if(idx>6){showPage('daily');return;}
  currentMasanda=idx;
  document.querySelectorAll('.masanda-panel').forEach((p,i)=>p.classList.toggle('active',i===idx));
  document.querySelectorAll('.masanda-tab').forEach((t,i)=>t.classList.toggle('active',i===idx));
}

function saveReport() {
  const date=document.getElementById('inp-date').value;
  if(!date){showToast('⚠️ يرجى تحديد التاريخ',true);return;}
  const report={date,day:document.getElementById('inp-day').value,masandat:[]};
  MASANDAT.forEach((m,mi)=>{
    const entry={name:m.name,wings:m.wings,
      beneficiaries:+document.getElementById(`m${mi}-beneficiaries`).value||0,
      violations:+document.getElementById(`m${mi}-violations`).value||0,
      axes:[],
      obs:{amni:document.getElementById(`m${mi}-obs-amni`).value,
           fanni:document.getElementById(`m${mi}-obs-fanni`).value,
           baramij:document.getElementById(`m${mi}-obs-baramij`).value}};
    AXES.forEach((ax,ai)=>{
      const scores=ax.items.map((_,ii)=>{
        const s=document.querySelector(`.score-btn.selected[data-mi="${mi}"][data-ai="${ai}"][data-ii="${ii}"]`);
        return s?+s.dataset.val:0;
      });
      entry.axes.push({key:ax.key,label:ax.label,scores,total:scores.reduce((a,b)=>a+b,0)});
    });
    entry.totalScore=entry.axes.reduce((s,a)=>s+a.total,0);
    report.masandat.push(entry);
  });
  localStorage.setItem('report_'+date,JSON.stringify(report));
  showToast('✅ تم حفظ التقرير بنجاح');
  document.getElementById('view-date').value=date;
  setTimeout(()=>{showPage('daily');renderDailyReport();},700);
  loadHistory();
}

function clearForm() {
  if(!confirm('مسح جميع البيانات المدخلة؟'))return;
  MASANDAT.forEach((_,mi)=>{
    ['beneficiaries','violations'].forEach(f=>{const el=document.getElementById(`m${mi}-${f}`);if(el)el.value='';});
    document.querySelectorAll(`.score-btn[data-mi="${mi}"]`).forEach(b=>b.classList.remove('selected'));
    AXES.forEach((_,ai)=>{
      const el=document.getElementById(`m${mi}-ax${ai}-total`);if(el)el.textContent='0 / 15';
      AXES[ai].items.forEach((_,ii)=>{const e=document.getElementById(`m${mi}-ax${ai}-i${ii}-val`);if(e)e.textContent='—';});
    });
    const avg=document.getElementById(`m${mi}-avg`);if(avg)avg.value='';
    ['amni','fanni','baramij'].forEach(k=>{const el=document.getElementById(`m${mi}-obs-${k}`);if(el)el.value='';});
  });
  showToast('🗑️ تم مسح البيانات');
}

function renderDailyReport() {
  const date=document.getElementById('view-date').value;
  if(!date)return;
  const stored=localStorage.getItem('report_'+date);
  const c=document.getElementById('daily-content');
  if(!stored){
    c.innerHTML=`<div class="empty-state"><div class="icon">📭</div><p>لا يوجد تقرير لتاريخ ${date}</p></div>`;
    return;
  }
  const r=JSON.parse(stored);
  const d=new Date(date+'T12:00:00');
  const totalBen=r.masandat.reduce((s,m)=>s+m.beneficiaries,0);
  const totalVio=r.masandat.reduce((s,m)=>s+m.violations,0);
  const avgScore=r.masandat.reduce((s,m)=>s+m.totalScore,0)/r.masandat.length;
  const active=r.masandat.filter(m=>m.totalScore>0);
  const best3=[...active].sort((a,b)=>b.totalScore-a.totalScore).slice(0,3);
  const worst3=[...active].sort((a,b)=>a.totalScore-b.totalScore).slice(0,3);

  c.innerHTML=`
    <div class="report-view">
      <div class="report-view-header">
        <h1>🏛️ التقرير اليومي لأداء المراكز – الفترة المسائية</h1>
        <p>${DAYS_AR[d.getDay()]} | ${date}</p>
      </div>
      <div style="padding:24px">
        <div class="stats-grid">
          <div class="stat-card" style="--stat-color:var(--accent)"><div class="stat-value">${totalBen.toLocaleString('ar-SA')}</div><div class="stat-label">إجمالي المستفيدين</div></div>
          <div class="stat-card" style="--stat-color:var(--red)"><div class="stat-value" style="color:var(--red)">${totalVio}</div><div class="stat-label">إجمالي المخالفات</div></div>
          <div class="stat-card" style="--stat-color:var(--gold)"><div class="stat-value" style="color:var(--gold)">${avgScore.toFixed(1)}</div><div class="stat-label">متوسط الدرجات</div></div>
          <div class="stat-card" style="--stat-color:var(--green)"><div class="stat-value" style="color:var(--green)">${active.length}</div><div class="stat-label">مساندات مُقيَّمة</div></div>
        </div>
        <div class="card">
          <div class="card-title">📋 أولاً: ملخص الأداء العام</div>
          <div style="overflow-x:auto">
            <table class="report-table">
              <thead><tr><th>المساندة</th><th>المراكز</th><th>المستفيدون</th><th>المخالفات</th><th>الالتزام</th><th>السلوك</th><th>التفاعل</th><th>السكن</th><th>الإجمالي</th></tr></thead>
              <tbody>
                ${r.masandat.map(m=>{
                  const sc=m.totalScore,pct=(sc/60)*100;
                  const cls=pct>=83?'score-high':pct>=58?'score-med':'score-low';
                  return `<tr><td><strong>${m.name}</strong></td><td>${m.wings.length}</td><td>${m.beneficiaries||'—'}</td><td style="color:var(--red);font-weight:700">${m.violations||0}</td>${m.axes.map(a=>`<td>${a.total||'—'}/15</td>`).join('')}<td><span class="score-pill ${cls}">${sc}/60</span></td></tr>`;
                }).join('')}
                <tr class="total-row"><td>الإجمالي</td><td>${r.masandat.reduce((s,m)=>s+m.wings.length,0)}</td><td>${totalBen}</td><td>${totalVio}</td>${[0,1,2,3].map(ai=>`<td>${(r.masandat.reduce((s,m)=>s+(m.axes[ai]?.total||0),0)/r.masandat.filter(m=>(m.axes[ai]?.total||0)>0).length||0).toFixed(1)}</td>`).join('')}<td>${avgScore.toFixed(1)}/60</td></tr>
              </tbody>
            </table>
          </div>
        </div>
        <div class="card">
          <div class="card-title">🏆 ثانياً: أفضل وأسوأ المساندات</div>
          <div class="ranking-grid">
            <div class="rank-card"><div class="rank-header rank-best">✅ أفضل 3 مساندات</div>${best3.map((m,i)=>`<div class="rank-item"><span><span class="rank-medal">${['🥇','🥈','🥉'][i]}</span>${m.name}</span><span class="score-pill score-high">${m.totalScore}/60</span></div>`).join('')}</div>
            <div class="rank-card"><div class="rank-header rank-worst">❌ أسوأ 3 مساندات</div>${worst3.map((m,i)=>`<div class="rank-item"><span><span class="rank-medal">🔻${i+1}</span>${m.name}</span><span class="score-pill score-low">${m.totalScore}/60</span></div>`).join('')}</div>
          </div>
          <div class="chart-container">
            <div class="chart-title">توزيع الدرجات بالمساندة</div>
            <div class="bar-chart">
              ${r.masandat.map(m=>{
                const pct=(m.totalScore/60)*100;
                const color=pct>=83?'var(--green)':pct>=58?'var(--accent)':'var(--red)';
                return `<div class="bar-row"><div class="bar-label">${m.name.replace('المساندة ','').replace('تعايش + هويتي','تعايش')}</div><div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${color}"></div></div><div class="bar-val">${m.totalScore}</div></div>`;
              }).join('')}
            </div>
          </div>
        </div>
        <div class="card">
          <div class="card-title">📝 ثالثاً: تحليل الملاحظات</div>
          ${['amni','fanni','baramij'].map((key,i)=>{
            const icons=['🛡️','🔧','📚'],labels=['المسار الأمني','المسار الفني','مسار البرامج والأنشطة'];
            const rows=r.masandat.filter(m=>m.obs[key]);
            return rows.length?`<div style="margin-bottom:14px"><div style="font-size:13px;font-weight:700;color:var(--text);margin-bottom:8px">${icons[i]} ${labels[i]}</div><table class="report-table"><thead><tr><th>المساندة</th><th>الملاحظة</th></tr></thead><tbody>${rows.map(m=>`<tr><td><strong>${m.name}</strong></td><td>${m.obs[key]}</td></tr>`).join('')}</tbody></table></div>`:'';
          }).join('')}
        </div>
      </div>
    </div>`;
}

function showPeriod(type,btn) {
  document.querySelectorAll('.period-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const keys=Object.keys(localStorage).filter(k=>k.startsWith('report_')).sort();
  const all=keys.map(k=>JSON.parse(localStorage.getItem(k)));
  if(!all.length){document.getElementById('period-content').innerHTML=`<div class="empty-state"><div class="icon">📅</div><p>لا توجد بيانات بعد</p></div>`;return;}
  if(type==='weekly') renderWeekly(all);
  else renderMonthly(all);
}

function renderWeekly(reports) {
  const weeks={};
  reports.forEach(r=>{const d=new Date(r.date+'T12:00:00');const wk=r.date.substring(0,4)+'-W'+String(getWeekNum(d)).padStart(2,'0');if(!weeks[wk])weeks[wk]=[];weeks[wk].push(r);});
  let html='';
  Object.entries(weeks).sort().reverse().forEach(([wk,rpts])=>{
    const totalBen=rpts.reduce((s,r)=>s+r.masandat.reduce((ss,m)=>ss+m.beneficiaries,0),0);
    const totalVio=rpts.reduce((s,r)=>s+r.masandat.reduce((ss,m)=>ss+m.violations,0),0);
    html+=`<div class="card"><div class="card-title">📅 ${wk} | ${rpts.length} أيام مُسجَّلة</div>
      <div class="stats-grid" style="grid-template-columns:repeat(3,1fr)">
        <div class="stat-card"><div class="stat-value">${rpts.length}</div><div class="stat-label">أيام مُسجَّلة</div></div>
        <div class="stat-card"><div class="stat-value">${totalBen.toLocaleString()}</div><div class="stat-label">إجمالي المستفيدين</div></div>
        <div class="stat-card" style="--stat-color:var(--red)"><div class="stat-value" style="color:var(--red)">${totalVio}</div><div class="stat-label">إجمالي المخالفات</div></div>
      </div>
      <div class="chart-container"><div class="chart-title">متوسط الدرجات الأسبوعي</div><div class="bar-chart">
        ${MASANDAT.map((m,mi)=>{const avg=rpts.reduce((s,r)=>s+(r.masandat[mi]?.totalScore||0),0)/rpts.length;const pct=(avg/60)*100;const color=pct>=83?'var(--green)':pct>=58?'var(--accent)':'var(--red)';return `<div class="bar-row"><div class="bar-label">${m.name.replace('المساندة ','').replace('تعايش + هويتي','تعايش')}</div><div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${color}"></div></div><div class="bar-val">${avg.toFixed(1)}</div></div>`;}).join('')}
      </div></div></div>`;
  });
  document.getElementById('period-content').innerHTML=html;
}

function renderMonthly(reports) {
  const months={};
  reports.forEach(r=>{const mk=r.date.substring(0,7);if(!months[mk])months[mk]=[];months[mk].push(r);});
  let html='';
  Object.entries(months).sort().reverse().forEach(([mk,rpts])=>{
    const [yr,mo]=mk.split('-');
    const totalBen=rpts.reduce((s,r)=>s+r.masandat.reduce((ss,m)=>ss+m.beneficiaries,0),0);
    const totalVio=rpts.reduce((s,r)=>s+r.masandat.reduce((ss,m)=>ss+m.violations,0),0);
    const grandAvg=rpts.reduce((s,r)=>s+r.masandat.reduce((ss,m)=>ss+m.totalScore,0),0)/(rpts.length*7);
    html+=`<div class="card"><div class="card-title">📆 ${MONTHS_AR[+mo-1]} ${yr} | ${rpts.length} يوم مُسجَّل</div>
      <div class="stats-grid">
        <div class="stat-card"><div class="stat-value">${rpts.length}</div><div class="stat-label">أيام مُسجَّلة</div></div>
        <div class="stat-card"><div class="stat-value">${totalBen.toLocaleString()}</div><div class="stat-label">إجمالي المستفيدين</div></div>
        <div class="stat-card" style="--stat-color:var(--red)"><div class="stat-value" style="color:var(--red)">${totalVio}</div><div class="stat-label">إجمالي المخالفات</div></div>
        <div class="stat-card" style="--stat-color:var(--gold)"><div class="stat-value" style="color:var(--gold)">${grandAvg.toFixed(1)}</div><div class="stat-label">متوسط الدرجات الشهري</div></div>
      </div>
      <div class="chart-container"><div class="chart-title">متوسط الدرجات الشهري</div><div class="bar-chart">
        ${MASANDAT.map((m,mi)=>{const avg=rpts.reduce((s,r)=>s+(r.masandat[mi]?.totalScore||0),0)/rpts.length;const pct=(avg/60)*100;const color=pct>=83?'var(--green)':pct>=58?'var(--accent)':'var(--red)';return `<div class="bar-row"><div class="bar-label">${m.name.replace('المساندة ','').replace('تعايش + هويتي','تعايش')}</div><div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${color}"></div></div><div class="bar-val">${avg.toFixed(1)}</div></div>`;}).join('')}
      </div></div></div>`;
  });
  document.getElementById('period-content').innerHTML=html||`<div class="empty-state"><div class="icon">📆</div><p>لا توجد بيانات شهرية</p></div>`;
}

function loadHistory() {
  const keys=Object.keys(localStorage).filter(k=>k.startsWith('report_')).sort().reverse();
  const c=document.getElementById('history-content');
  if(!keys.length){c.innerHTML=`<div class="empty-state"><div class="icon">📭</div><p>لا توجد تقارير محفوظة بعد</p></div>`;return;}
  c.innerHTML=`<div style="overflow-x:auto"><table class="report-table"><thead><tr><th>التاريخ</th><th>اليوم</th>${MASANDAT.map(m=>`<th>${m.name.replace('المساندة ','م').replace('تعايش + هويتي','تعايش')}</th>`).join('')}<th>الإجراء</th></tr></thead><tbody>
    ${keys.map(k=>{const r=JSON.parse(localStorage.getItem(k));return `<tr><td><strong>${r.date}</strong></td><td>${r.day||''}</td>${r.masandat.map(m=>{const sc=m.totalScore,pct=(sc/60)*100;const cls=pct>=83?'score-high':pct>=58?'score-med':'score-low';return `<td><span class="score-pill ${cls}">${sc}</span></td>`;}).join('')}<td style="display:flex;gap:6px;padding:8px 14px"><button class="btn btn-outline" style="padding:5px 12px;font-size:12px" onclick="viewHistoryReport('${r.date}')">عرض</button><button class="btn btn-red" style="padding:5px 12px;font-size:12px" onclick="deleteReport('${r.date}')">حذف</button></td></tr>`;}).join('')}
  </tbody></table></div>`;
}

function viewHistoryReport(date){document.getElementById('view-date').value=date;showPage('daily');renderDailyReport();}
function deleteReport(date){if(!confirm('حذف تقرير '+date+'؟'))return;localStorage.removeItem('report_'+date);loadHistory();showToast('🗑️ تم الحذف');}

function showPage(name) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  const map={entry:0,daily:1,weekly:2,history:3};
  document.querySelectorAll('.nav-tab')[map[name]]?.classList.add('active');
  if(name==='weekly') showPeriod('weekly',document.querySelector('.period-btn'));
  if(name==='history') loadHistory();
}

function exportReport() {
  const c=document.getElementById('daily-content').innerHTML;
  if(!c) return;
  const w=window.open('','_blank');
  w.document.write(`<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet"><style>body{font-family:'Cairo',sans-serif;background:#fff;color:#222;direction:rtl;padding:20px}table{width:100%;border-collapse:collapse;margin-bottom:20px}th{background:#f5f5f5;padding:8px 12px;text-align:right;border:1px solid #ddd;font-size:12px}td{padding:8px 12px;border:1px solid #ddd}.score-pill{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:700}.score-high{background:#e6f4ec;color:#1a7f45}.score-med{background:#fef3e2;color:#c97a10}.score-low{background:#fdecea;color:#c0392b}.report-view-header{background:linear-gradient(135deg,#1d5fa8,#2563a8);color:#fff;padding:24px;text-align:center;border-radius:8px;margin-bottom:20px}.stat-value{font-size:24px;font-weight:900}.bar-track{width:200px;height:8px;background:#eee;border-radius:4px;display:inline-block}.bar-fill{height:100%;border-radius:4px;display:inline-block}.total-row td{background:#e8f0fb;font-weight:800;color:#1d5fa8}@media print{body{margin:0}}</style></head><body>${c}</body></html>`);
  w.document.close();
  w.print();
}

function showToast(msg,warn=false){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.style.background=warn?'#c97a10':'#1a7f45';
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}
</script>
